spring.application.name=lievit-kit-crud-admin

# Lievit: HS256 snapshot signing key (>= 32 bytes; the plain-text dev key is decoded as UTF-8 bytes).
# In production use a base64url-encoded secret via the LIEVIT_SIGNING_KEY environment variable.
lievit.signing-key=kit-crud-admin-dev-key-changeme-in-production-please-32b

# Session cookie hardening.
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
