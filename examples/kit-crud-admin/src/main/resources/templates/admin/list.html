<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${view.heading()} + ' - lievit admin'">Products - lievit admin</title>
    <style>
        body { font-family: sans-serif; max-width: 820px; margin: 40px auto; padding: 0 20px; }
        nav { display: flex; justify-content: space-between; align-items: center; }
        table { border-collapse: collapse; width: 100%; margin-top: 16px; }
        th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #eee; }
        tr:nth-child(even) td { background: #fafafa; }
        .actions a, .actions button { margin-right: 8px; }
        .badge { padding: 2px 8px; border-radius: 10px; font-size: 0.85em; background: #eee; }
        .pager { margin-top: 16px; }
        .search { border: 1px solid #ddd; padding: 12px; border-radius: 6px; margin: 16px 0; }
        .search input { padding: 6px; width: 280px; }
        button { cursor: pointer; }
    </style>
</head>
<body>
<nav>
    <h1 th:text="${view.heading()}">Products</h1>
    <span>
        <a th:href="${routes.create()}">+ New product</a>
        <form method="post" th:action="@{/logout}" style="display:inline">
            <button type="submit">Sign out</button>
        </form>
    </span>
</nav>

<!--
    The reactive lievit search island, mounted server-side by ProductAdminController and rendered
    here. The wire markers (data-lievit-id, data-lievit-snapshot) are stamped on its root, so the
    minimal driver below reads them with no hardcoded component id.
-->
<div id="search-mount" th:utext="${searchHtml}"></div>

<table>
    <thead>
        <tr>
            <th th:each="h : ${view.headerCells()}" th:text="${h.label()}">Column</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="row : ${view.rows()}">
            <td th:each="cell : ${row.cells()}" th:text="${cell}">cell</td>
            <td class="actions">
                <a th:href="${routes.edit(row.id())}">Edit</a>
                <form method="post"
                      th:action="@{'/admin/products/' + ${row.id()} + '/delete'}"
                      style="display:inline"
                      onsubmit="return confirm('Delete this product?');">
                    <button type="submit">Delete</button>
                </form>
            </td>
        </tr>
        <tr th:if="${view.rows().isEmpty()}">
            <td th:colspan="${view.headerCells().size()} + 1">No products yet.</td>
        </tr>
    </tbody>
</table>

<div class="pager" th:with="p=${view.pagination()}">
    <a th:if="${p.hasPrevious()}"
       th:href="@{/admin/products(page=${p.previousPage()})}">&larr; Previous</a>
    <span th:text="'Page ' + ${p.page()} + ' of ' + ${p.totalPages()}">Page 1 of 1</span>
    <a th:if="${p.hasNext()}"
       th:href="@{/admin/products(page=${p.nextPage()})}">Next &rarr;</a>
</div>

<!--
    Minimal lievit wire driver for the search island. In a production app this is the lievit-ui
    client runtime; inlined here so the example has no build step for the front end. It binds
    l:model.live (debounced) and posts to /lievit/{id}/call, reading the id from data-lievit-id.
-->
<script th:inline="javascript">
    (function () {
        var root = document.querySelector('#search-mount [data-lievit-component]');
        if (!root) return;
        var cid = root.getAttribute('data-lievit-id');
        var snapshot = root.getAttribute('data-lievit-snapshot');
        var timer = null;

        function call(calls, updates) {
            return fetch('/lievit/' + cid + '/call', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ _snapshot: snapshot, _updates: updates || {}, _calls: calls || [] })
            }).then(function (res) {
                snapshot = res.headers.get('Lievit-Snapshot') || snapshot;
                return res.text();
            }).then(function (html) {
                root.innerHTML = html;
                // Re-find the input (morph would preserve it; innerHTML here rebuilds it).
                bind();
            });
        }

        function bind() {
            var input = root.querySelector('[l\\:model\\.live]');
            if (!input) return;
            input.addEventListener('input', function () {
                clearTimeout(timer);
                var field = input.getAttribute('l:model.live');
                var value = input.value;
                timer = setTimeout(function () { call([], makeUpdate(field, value)); }, 150);
            });
        }

        function makeUpdate(field, value) {
            var u = {};
            u[field] = value;
            return u;
        }

        bind();
    })();
</script>
</body>
</html>
