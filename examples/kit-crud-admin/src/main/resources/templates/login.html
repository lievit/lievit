<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in - lievit admin</title>
    <style>
        body { font-family: sans-serif; max-width: 360px; margin: 80px auto; padding: 0 20px; }
        label { display: block; margin: 12px 0 4px; }
        input { padding: 8px; width: 100%; box-sizing: border-box; }
        button { padding: 8px 16px; margin-top: 16px; cursor: pointer; }
        .hint { color: #666; font-size: 0.9em; margin-top: 16px; }
        .msg { color: #b00; }
    </style>
</head>
<body>
<h1>lievit admin</h1>
<p class="msg" th:if="${param.error}">Invalid username or password.</p>
<p th:if="${param.logout}">You have been signed out.</p>
<form method="post" th:action="@{/login}">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" autofocus>
    <label for="password">Password</label>
    <input type="password" id="password" name="password">
    <button type="submit">Sign in</button>
</form>
<p class="hint">Demo credentials: <code>admin</code> / <code>admin</code>.</p>
</body>
</html>
