spring.application.name=lievit-golden-path-starter

# Lievit: HS256 snapshot signing key (>= 32 bytes; plain-text dev key decoded as UTF-8 bytes).
# Replace with a base64url-encoded secret in production (lievit.signing-key).
lievit.signing-key=golden-path-starter-dev-key-changeme-in-production-please

# H2 in-memory datasource (no external DB required for the demo).
spring.datasource.url=jdbc:h2:mem:lievitdemo;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Run schema.sql on every startup (creates the users table).
spring.sql.init.mode=always

# Session cookie: HttpOnly (XSS hardening); not Secure so http://localhost works.
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
