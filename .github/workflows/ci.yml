name: ci

# STUB — to be filled when the Maven build lands (see docs/PLAN.md and docs/adr/0008).
# Mirrors the sister repos' shape (build/test matrix + a native job + a tracegate
# drift-gate) but is intentionally inert while there is no `pom.xml`: every job
# short-circuits with a clear message instead of failing an empty build. Replace the
# guarded steps with the real Maven invocations once the modules exist.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Java 25 is the lievit target; the matrix shape is kept for parity with
        # the sister repos and to add LTS rows when the build lands.
        java: [ '25' ]
    name: build (java ${{ matrix.java }})
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Build, test (stub until pom.xml exists)
        run: |
          if [ -f pom.xml ]; then
            ./mvnw -B -ntp -V verify
          else
            echo "::notice::No pom.xml yet — lievit is in the pre-build foundation phase."
            echo "Skipping the Maven build. This job is a stub; see docs/PLAN.md and docs/adr/0008."
          fi

  native:
    runs-on: ubuntu-latest
    name: native (AOT metadata + reachability gate)
    # lievit's modules are LIBRARIES with no main class, so there is no image to `native:compile`
    # in this reactor (that happens in an adopter app, which inherits the full pipeline from
    # spring-boot-starter-parent). The meaningful gate here is: the `native` profile + the AOT
    # contributors compile, and the reachability metadata is complete — proven by the native
    # *NfrTest hint-completeness tests (RuntimeHintsPredicates) without paying a full image build.
    # See ADR-0006 + docs/native-image.md. When an example app module lands, extend this to run
    # `./mvnw -Pnative -pl <app> native:compile` and start/smoke the image.
    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: maven

      - name: AOT processing + native reachability tests
        run: |
          ./mvnw -B -ntp -V -Pnative \
            -pl lievit-core,lievit-jte,lievit-spring-boot-starter -am \
            test -Dtest='com.iambilotta.lievit.spring.native_.*' -Dsurefire.failIfNoSpecifiedTests=false

  lievit-ui:
    name: lievit-ui registry (typecheck + test + drift)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lievit-ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: lievit-ui/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Registry drift gate
        run: npm run check:registry

      - name: Test
        run: npm test

  tracegate:
    name: tracegate drift-gate (stub)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Living-requirements drift-gate (stub until tests exist)
        run: |
          if [ -f tracegate.toml ]; then
            pip install "git+https://github.com/iambilotta/tracegate@${TRACEGATE_REF:-HEAD}"
            tracegate . --check
          else
            echo "::notice::No tracegate.toml yet — the living-requirements gate is a stub."
            echo "It activates with the Maven build; see docs/PLAN.md."
          fi
