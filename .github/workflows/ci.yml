name: ci

# The lievit Maven reactor is live (11 modules, builds green). This workflow runs the real
# gates: a full `./mvnw -B verify` (unit + integration + ArchUnit boundaries + JaCoCo report)
# and a cheap native reachability check (no full image build). See docs/PLAN.md and docs/adr/0008.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Java 25 is the lievit release target; the matrix shape stays so LTS rows can be added.
        java: [ '25' ]
    name: build (java ${{ matrix.java }})
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Build, test, verify
        run: ./mvnw -B -ntp -V verify

  native:
    runs-on: ubuntu-latest
    name: native (AOT metadata + reachability gate)
    # lievit's modules are LIBRARIES with no main class, so there is no image to `native:compile`
    # in this reactor (that happens in an adopter app, which inherits the full pipeline from
    # spring-boot-starter-parent). The meaningful, cheap gate here is: the `native` profile + the
    # AOT contributors compile, and the reachability metadata is complete, proven by the native
    # *NfrTest hint-completeness tests (RuntimeHintsPredicates) without paying a full image build.
    # See ADR-0006 + docs/native-image.md. When an example app module opts in, extend this to run
    # `./mvnw -Pnative -pl <app> native:compile` and start/smoke the image.
    steps:
      - uses: actions/checkout@v5

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: maven

      - name: AOT processing + native reachability tests
        run: |
          ./mvnw -B -ntp -V -Pnative \
            -pl lievit-core,lievit-jte,lievit-spring-boot-starter -am \
            test -Dtest='io.lievit.spring.native_.*' -Dsurefire.failIfNoSpecifiedTests=false

  lievit-ui:
    name: lievit-ui registry (typecheck + test + drift)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lievit-ui
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: lievit-ui/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Registry drift gate
        run: npm run check:registry

      - name: Test
        run: npm test

# NOTE: there is no tracegate job. The living-requirements drift-gate (tracegate) is not wired
# for lievit yet: there is no tracegate.toml and no generated `_generated/` catalog in this repo.
# A placeholder job that always short-circuits would lie about a gate that does not run, so it is
# omitted on purpose. When the living-docs setup lands (docs/PLAN.md), add a real tracegate job
# pinned to a commit, gated on a committed tracegate.toml.
