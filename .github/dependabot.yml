version: 2
updates:
  # The Maven reactor is live (11 modules); this block tracks the build's dependencies.
  - package-ecosystem: maven
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Rome
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: scope
    groups:
      spring-boot:
        patterns:
          - "org.springframework.boot:*"
          - "org.springframework:*"
      jte:
        patterns:
          - "gg.jte:*"
      junit:
        patterns:
          - "org.junit*:*"
          - "org.assertj:*"
      maven-plugins:
        patterns:
          - "org.apache.maven.plugins:*"

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Rome
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: scope

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Rome
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci"
      include: scope
